<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos | mklv.tech</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/theme.css" />
    <!-- Frontend app bundled at server startup (no external deps) -->
    <script type="module" src="/app.js"></script>
    <style>
      /* Global styles for body and loading state */
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* Loading state while components hydrate */
      todo-app:not(:defined) {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      todo-app:not(:defined)::before {
        content: "Loading...";
        color: var(--md-sys-color-outline);
      }
    </style>
  </head>
  <body>
    <!-- Lit todo app component -->
    <todo-app></todo-app>
  </body>
</html>
